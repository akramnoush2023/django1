{% extends 'blog/base.html' %}

{% block  title %}{{ post.details }}{% endblock  %}

{% block content %}
    <h1>{{ post.title }}</h1>
    <p class="data">
        Published {{ post.publish }} by {{ post.author }}
    </p>
    {{ post.body|linebreaks }}
    <hr />
    <P>
        <a href="{% url 'blog:post_share' post.id %}">
            Share this post
        </a>
    </p>
{% endblock %}
